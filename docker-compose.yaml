services:
  fastapi:
    container_name: library_app
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://libraryAPI:hallowelt@mysql:3306/library}
    networks:
      - library-network

networks:
  library-network:
    external: true
